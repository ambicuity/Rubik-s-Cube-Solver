name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint — check for console.log in proxy files
        run: |
          echo "Checking proxy files do not expose secrets..."
          if grep -r "api[Kk]ey\s*=" proxy/ --include="*.js" | grep -v "process.env\|GEMINI_API_KEY\|env\." ; then
            echo "FAIL: hardcoded API key detected in proxy/"
            exit 1
          fi
          echo "PASS: no hardcoded secrets"

      - name: Lint — verify CORS is not wildcard
        run: |
          if grep -r "Allow-Origin.*'\*'" proxy/ --include="*.js"; then
            echo "FAIL: CORS wildcard (*) detected in proxy/"
            exit 1
          fi
          echo "PASS: CORS is locked"

      - name: Lint — verify vendor files present
        run: |
          test -f src/vendor/three.module.js || (echo "FAIL: three.module.js not vendored" && exit 1)
          echo "PASS: vendor files present"

      - name: Run unit tests
        run: npm test

      - name: Check test results
        if: always()
        run: echo "CI complete"
