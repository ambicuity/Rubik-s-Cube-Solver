name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deployment at a time; don't cancel in-progress
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # ── 1. Tests must pass before anything deploys ──────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm test

  # ── 2. Deploy Cloudflare Worker with all secrets ────────────────────────────
  deploy-worker:
    name: Deploy Cloudflare Worker
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Wrangler
        run: npm install -g wrangler

      # Push GEMINI_API_KEY secret from GitHub → Cloudflare Worker secret
      - name: Set GEMINI_API_KEY on Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "${{ secrets.GEMINI_API_KEY }}" | wrangler secret put GEMINI_API_KEY

      # Keep HMAC_SECRET in sync (rotate here to rotate everywhere)
      - name: Set HMAC_SECRET on Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "${{ secrets.HMAC_SECRET }}" | wrangler secret put HMAC_SECRET

      # Deploy the Worker script itself
      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy

  # ── 3. Deploy static site to GitHub Pages ───────────────────────────────────
  deploy-pages:
    name: Deploy GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
